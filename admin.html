<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Create | Learn With Kumbar Sir</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <h1>Learn With Kumbar Sir</h1>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="admin.html" class="active">Admin</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h2>Admin Create Panel</h2>
        <p>Authorized users can add notes, videos, and updates here.</p>
    </section>

    <section class="subjects">
        <div class="card" style="width: 100%; max-width: 900px; text-align: left;">
            <h3>Create / Edit Content</h3>
            <p style="margin-bottom: 12px; color: #555;">A password is required to publish, edit, or delete content.</p>
            <form id="postForm">
                <input id="postId" type="hidden">
                <label>Title</label><br>
                <input id="postTitle" type="text" placeholder="Enter title" required style="margin-bottom: 10px;"><br>
                <label>Content Type</label><br>
                <select id="postType" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px;">
                    <option value="Note">Note</option>
                    <option value="PDF">PDF</option>
                    <option value="Video">Video</option>
                    <option value="Update">Update</option>
                </select><br>
                <label>Subject</label><br>
                <select id="postSubject" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px;">
                    <option value="English">English</option>
                    <option value="Kannada">Kannada</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Social Science">Social Science</option>
                </select><br>
                <label>Link / URL (optional)</label><br>
                <input id="postLink" type="url" placeholder="https://example.com" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px;"><br>
                <label>Description</label><br>
                <textarea id="postDescription" rows="5" placeholder="Enter details" required style="margin-bottom: 10px;"></textarea><br>
                <div class="admin-actions">
                    <button class="btn" id="submitPostBtn" type="submit">Publish</button>
                    <button class="btn btn-secondary" id="cancelEditBtn" type="button" style="display:none;">Cancel Edit</button>
                </div>
            </form>
        </div>

        <div class="card" style="width: 100%; max-width: 900px; text-align: left; margin-top: 20px;">
            <h3>Manage Published Posts</h3>
            <div id="adminPostsList" class="updates-list"></div>
        </div>
    </section>

    <footer>
        <p>© <span id="year"></span> Learn With Kumbar Sir | All Rights Reserved</p>
    </footer>
    <script src="js/script.js"></script>
</body>
</html>
